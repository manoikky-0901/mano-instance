<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="login-box">

<h2>☁ Cloud Login</h2>

<div class="input-box">
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<button class="login-btn">Login</button>

<div class="social-login">

<button class="google">Login with Google</button>
<button class="github">Login with GitHub</button>

</div>

<p class="links">
<a href="#">Forgot Password?</a> |
<a href="#">Create Account</a>
</p>

<div class="last-login">
<p>Last login: Chennai</p>
<p>Device: Chrome Windows</p>
<p>Time: 9:30 AM</p>
</div>

</div>

</div>

</body>
</html>
